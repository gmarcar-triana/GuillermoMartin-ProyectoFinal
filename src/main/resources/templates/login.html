<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <title>Please Log In</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

	<div th:replace="~{fragments/general :: cabecera}"></div>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

	
    <div class="card shadow-lg border-0 rounded-4" style="width: 100%; max-width: 400px;">
        <div class="card-body p-5">
            
            <h2 class="text-center mb-4 fw-bold text-primary">Productos Gourmet</h2>

            <div th:if="${param.error}" class="alert alert-danger text-center" role="alert">
                Usuario o contraseña no válido.
            </div>
            <div th:if="${param.logout}" class="alert alert-success text-center" role="alert">
                Bienvenido.
            </div>

            <form th:action="@{/login}" method="post">
                
                <div class="mb-3">
                    <label for="username" class="form-label text-muted fw-semibold">Usuario</label>
                    <input type="text" id="username" name="username" class="form-control form-control-lg bg-light" placeholder="Usuario..." required autofocus/>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label text-muted fw-semibold">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control form-control-lg bg-light" placeholder="Contraseña..." required/>
                </div>
                
                <div class="d-grid mt-2">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">
                        Iniciar Session
                    </button>
                </div>

            </form>
        </div>
    </div>

	
</body>
	<div th:replace="~{fragments/general :: pie}"></div>


</html>
