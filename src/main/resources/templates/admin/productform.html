<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Productos</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styleFormProduct.css}">
	<style>
	    body {
	        background-color: #f8f9fa;
	        padding-top: 80px; 
	        padding-bottom: 80px;
	    }
	</style>
</head>

<body>
	<div th:replace="~{fragments/general :: cabecera}"></div>

	
    <div class="container form-container">
        <h2 class="text-center mb-4">Añadir Nuevo Producto</h2>
		<form method="POST" action="#" th:action="@{/admin/nuevo/submit}" th:object="${producto}">
		    <input type="hidden" th:field="${producto.codigoProducto}" />
		    <div class="mb-3">
		        <label class="form-label fw-bold">Nombre</label>
		        <input type="text" class="form-control" name="nombre" th:field="${producto.nombre}" placeholder="Nombre..." />
		    </div>
			<div class="mb-3">
                <label class="form-label fw-bold">Precio</label>
                <input type="text" class="form-control" name="precio" th:field="${producto.precio}"
                    placeholder="Precio..." />
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Descripción</label>
                <input type="text" class="form-control" name="descripcion" th:field="${producto.descripcion}"
                    placeholder="Descripcion..." />
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold d-block">Stock</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="stock" id="stockTrue"
                        th:field="${producto.stock}" value="true" />
                    <label class="form-check-label" for="stockTrue">Sí</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="stock" id="stockFalse"
                        th:field="${producto.stock}" value="false" />
                    <label class="form-check-label" for="stockFalse">No</label>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Categoría</label>
                <input type="text" class="form-control" name="categoria" th:field="${producto.categoria}"
                    placeholder="Categoria..." />
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Fecha de caducidad</label>
                <input type="date" class="form-control" name="fechaCaducidad" th:field="${producto.fechaCaducidad}"
                    placeholder="Fecha de caducidad..." />
            </div>
			<div class="mb-3">
			    <label class="form-label fw-bold">Descuento</label>
			    <input type="text" class="form-control" name="descuento" th:field="${producto.descuento}"
			        placeholder="Descuento..." />
			</div>
			<div class="mb-3">
			    <label class="form-label fw-bold">Imagen Url</label>
			    <input type="text" class="form-control" name="Imagen Url" th:field="${producto.imagenUrl}"
			        placeholder="Imagen Url..." />
			</div>

            <div class="d-grid mt-4">
                <input type="submit" class="btn btn-primary" name="enviar" value="Enviar" />
            </div>
        </form>
    </div>
	
	<div th:replace="~{fragments/general :: pie}"></div>


</body>

</html>
