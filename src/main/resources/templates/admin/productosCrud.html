<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos Gourmet — Panel Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	<script th:src="@{/js/buscadorProductos.js}"></script>
	<script th:src="@{/js/confirmarBorrado.js}"></script>
	<link rel="stylesheet" type="text/css" th:href="@{../css/style.css}">

</head>

<body class="bg-light">

    <div th:replace="~{fragments/general :: cabecera}"></div>

    <div class="container mt-5 pt-4 bg-white p-4 rounded-4 shadow-sm">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="m-0 fw-bold text-dark">Lista de Productos</h2>
            <a href="#" th:href="@{/admin/nuevoProducto}" class="btn btn-success fw-semibold shadow-sm">
                <i class="bi bi-plus-circle me-1"></i> Añadir Producto
            </a>
        </div>

        <div class="input-group mb-3" style="max-width: 380px;">
            <span class="input-group-text bg-white border-end-0">
                <i class="bi bi-search text-muted"></i>
            </span>
            <input type="text" id="buscador" class="form-control border-start-0 ps-0"
                placeholder="Buscar por nombre..." autocomplete="off">
        </div>

        <div class="table-responsive">
            <table class="table table-hover table-bordered align-middle text-center">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Descripción</th>
                        <th>Stock</th>
                        <th>Categoría</th>
                        <th>Caducidad</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody th:remove="all-but-first">
                    <tr class="fila-producto" th:each="producto : ${listaProductos}">
                        <td class="fw-bold text-secondary" th:text="${producto.codigoProducto}"></td>
                        <td id="nombreProducto" th:text="${producto.nombre}"></td>
                        <td class="fw-semibold" th:text="${#numbers.formatDecimal(producto.precio, 1, 2) + ' €'}"></td>

                        <td class="text-start text-truncate" style="max-width: 200px;"
                            th:text="${producto.descripcion}"></td>

                        <td>
                            <span class="badge" th:classappend="${producto.stock ? 'bg-success' : 'bg-danger'}"
                                th:text="${producto.stock ? 'Sí' : 'No'}">
                            </span>
                        </td>

                        <td th:text="${producto.categoria}"></td>
                        <td th:text="${#temporals.format(producto.fechaCaducidad, 'dd/MM/yyyy')}"></td>

                        <td>
                            <div class="btn-group btn-group-sm" role="group">
                                <a th:href="@{/admin/editar/{id}(id=${producto.codigoProducto})}"
                                    class="btn btn-outline-primary">
                                    <i class="bi bi-pencil-square"></i> Editar
                                </a>
                                <a th:href="@{/detalles/{id}(id=${producto.codigoProducto})}"
                                    class="btn btn-outline-warning">
                                    <i class="bi bi-eye"></i> Detalles
                                </a>
                                <button type="button" class="btn btn-outline-danger btn-borrar-producto"
                                    th:attr="data-url=@{/admin/borrar/{id}(id=${producto.codigoProducto})},data-nombre=${producto.nombre}">
                                    <i class="bi bi-trash"></i> Borrar
                                </button>
                            </div>
                        </td>
                    </tr>
                    <tr id="sinResultados" style="display: none;">
                        <td colspan="8" class="text-center text-muted py-4">
                            <i class="bi bi-search me-2 fs-4"></i>
                            <span class="fs-5">No se encontraron productos para "<span
                                    id="terminoBusqueda"></span>"</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal para confirma -->
    <div class="modal fade" id="modalConfirmarBorrado" tabindex="-1" aria-labelledby="modalBorradoLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title fw-bold" id="modalBorradoLabel">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>Confirmar borrado
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-1">¿Estás seguro de que quieres borrar el producto:</p>
                    <p class="fw-bold fs-5 text-danger" id="modalNombreProducto"></p>
                    <p class="text-muted small mb-0">Esta acción no se puede deshacer.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="bi bi-x-lg me-1"></i>Cancelar
                    </button>
                    <button type="button" class="btn btn-danger fw-bold" id="btnConfirmarBorrado">
                        <i class="bi bi-trash me-1"></i>Sí, borrar
                    </button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
