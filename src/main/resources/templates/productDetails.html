<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
	<style>
	    body {
	        background-color: #f8f9fa;
	        padding-top: 45px; 
	        padding-bottom: 40px;
	    }
	    .product-img {
	        max-height: 450px;
	        object-fit: cover;
	        border-radius: 1.5rem;
	    }
	</style>
</head>

<body>

    <div th:replace="~{fragments/general :: cabecera}"></div>

    <main class="container my-5">
        <div class="row mb-4">
            <div class="col-12">
                <a href="/productos" class="btn btn-link text-decoration-none text-muted p-0">
                    <i class="bi bi-arrow-left me-2"></i>Volver al catálogo
                </a>
            </div>
        </div>

        <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 1rem;">
            <div class="row g-0">
                
                <div class="col-md-6 bg-light d-flex align-items-center justify-content-center p-4">
                    <img th:src="${producto.imagenUrl != null ? producto.imagenUrl : 'https://static.thenounproject.com/png/1077596-200.png'}" 
                         th:alt="${producto.nombre}" 
                         class="img-fluid product-img shadow-sm">
                </div>

                <div class="col-md-6 p-4 p-lg-5 d-flex flex-column justify-content-between">
                    <div>
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="badge bg-primary-subtle text-primary px-3 py-2 rounded-pill fw-semibold text-uppercase" 
                                  th:text="${producto.categoria}">Categoría</span>
                            
                            <span th:if="${producto.stock}" class="badge bg-success-subtle text-success px-3 py-2 rounded-pill">
                                <i class="bi bi-check-circle-fill me-1"></i> En Stock
                            </span>
                            <span th:unless="${producto.stock}" class="badge bg-danger-subtle text-danger px-3 py-2 rounded-pill">
                                <i class="bi bi-x-circle-fill me-1"></i> Agotado
                            </span>
                        </div>

                        <h1 class="fw-bold text-dark mb-3" th:text="${producto.nombre}">Nombre del Producto</h1>
                        
                        <p class="text-muted small mb-4">Ref: <span th:text="${producto.codigoProducto}">0000</span></p>

                        <div class="mb-4">
                            <div th:if="${producto.descuento > 0}">
                                <span class="display-5 fw-bold text-danger me-2" 
                                      th:text="${#numbers.formatDecimal(producto.precio * (1 - producto.descuento / 100), 1, 2, 'COMMA')} + ' €'">0.00 €</span>
                                <span class="text-muted text-decoration-line-through fs-5" 
                                      th:text="${#numbers.formatDecimal(producto.precio, 1, 2, 'COMMA')} + ' €'">0.00 €</span>
                                <span class="badge bg-danger ms-2" th:text="'-' + ${producto.descuento} + '%'">-10%</span>
                            </div>
                            <div th:unless="${producto.descuento > 0}">
                                <span class="display-5 fw-bold text-dark" 
                                      th:text="${#numbers.formatDecimal(producto.precio, 1, 2, 'COMMA')} + ' €'">0.00 €</span>
                            </div>
                        </div>

                        <h5 class="fw-bold text-secondary">Descripción</h5>
                        <p class="text-muted mb-4" th:text="${producto.descripcion}">Aquí va la descripción detallada del producto.</p>

                        <div th:if="${producto.fechaCaducidad != null}" class="alert alert-warning d-inline-flex align-items-center gap-2 py-2 px-3 border-0 rounded-3">
                            <i class="bi bi-calendar-event-fill text-warning-emphasis"></i>
                            <span class="small text-warning-emphasis">
                                Consumir preferentemente antes del: <strong th:text="${#temporals.format(producto.fechaCaducidad, 'dd/MM/yyyy')}">01/01/2026</strong>
                            </span>
                        </div>
                    </div>

                    <div class="mt-5 row g-2">
                        <div class="col-8 col-md-9">
                            <a th:href="@{/agregarProducto/{id}(id=${producto.codigoProducto})}" 
							class="btn btn-primary w-100 py-3 rounded-pill fw-bold" th:disabled="${!producto.stock}">
                                <i class="bi bi-bag-plus-fill me-2"></i> Añadir a la cesta
                            </a>
                        </div>
                    </div>

                </div>
            </div>
        </div>
		<div class="container py-5">
			<div th:replace="~{fragments/general :: productos}"></div>
		</div>
		
    </main>

    <div th:replace="~{fragments/general :: pie}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
