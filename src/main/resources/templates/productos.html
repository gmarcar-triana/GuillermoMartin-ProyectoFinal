<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos Gourmet - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body class="bg-light pt-5 pb-5 mt-4 mb-4">

    <div th:replace="~{fragments/general :: cabecera}"></div>

	<div class="container py-5">
	    <div class="d-flex justify-content-between align-items-center mb-5">
	        <h1 class="display-5 fw-bold text-dark mb-0">Descubre nuestros productos</h1>
	    </div>

	    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-5 g-4">

	        <div class="col" th:each="producto : ${listaProductos}">
	            <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden position-relative" 
	                 th:classappend="${!producto.stock ? 'opacity-75' : ''}">

	                <div class="position-relative">
	                    <img th:src="${producto.imagenUrl}" class="card-img-top object-fit-cover"
	                        alt="Imagen del producto" style="height: 200px;">
	                    
	                    <span class="position-absolute top-0 end-0 m-3 badge rounded-pill bg-dark bg-opacity-75 z-3"
	                        th:text="${producto.categoria}">Categoría</span>

	                    <span th:if="${producto.descuento > 0}" 
	                          class="position-absolute top-0 start-0 m-3 badge rounded-pill bg-danger shadow fs-6 fw-bold z-3">
	                          <i class="bi bi-tag-fill me-1"></i>
	                          <span th:text="'-' + ${#numbers.formatDecimal(producto.descuento * 100, 0, 0)} + '%'">-15%</span>
	                    </span>
	                    
	                    <div th:if="${!producto.stock}" class="position-absolute top-50 start-50 translate-middle">
	                        <span class="badge bg-secondary fs-5 text-uppercase shadow">Agotado</span>
	                    </div>
	                </div>

	                <div class="card-body d-flex flex-column">
	                    <h5 class="card-title fw-bold text-truncate" th:title="${producto.nombre}">
	                        <a th:href="@{/detalles/{id}(id=${producto.codigoProducto})}" 
	                           class="stretched-link text-decoration-none text-dark" 
	                           th:text="${producto.nombre}">Nombre</a>
	                    </h5>
	                    
	                    <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top">
	                        
	                        <div class="d-flex flex-column">
	                            <small th:if="${producto.descuento > 0}" 
	                                   class="text-decoration-line-through text-muted"
	                                   th:text="${#numbers.formatDecimal(producto.precio, 1, 2) + ' €'}"></small>
	                            
	                            <span class="fs-5 fw-bold" 
	                                  th:classappend="${producto.descuento > 0 ? 'text-danger' : 'text-primary'}"
	                                  th:text="${#numbers.formatDecimal(producto.precio * (1 - producto.descuento), 1, 2) + ' €'}">0.00 €</span>
	                        </div>

	                        <a th:href="@{/agregarProducto/{id}(id=${producto.codigoProducto})}" 
	                           class="btn btn-sm rounded-circle d-flex align-items-center justify-content-center position-relative z-3"
	                           th:classappend="${producto.stock ? 'btn-primary' : 'btn-secondary disabled'}"
	                           title="Añadir al carrito" style="width: 35px; height: 35px;">
	                            <i class="bi bi-cart-plus"></i>
	                        </a>
	                    </div>
	                </div>

	            </div>
	        </div>

	    </div>
	</div>

    <div th:replace="~{fragments/general :: pie}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
