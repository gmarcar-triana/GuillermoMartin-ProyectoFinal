<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Productos Gourmet - Inicio</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<link rel="stylesheet" type="text/css" th:href="@{/css/style.css}">
	<script th:src="@{/js/carrito.js}"></script>
</head>

<body class="bg-light pt-5 pb-5 mt-4 mb-4">

	<div th:replace="~{fragments/general :: cabecera}"></div>

	<div class="container mt-4 mb-5">
		<div id="carouselGourmet" class="carousel slide shadow-sm mb-5" data-bs-ride="carousel">
			<div class="carousel-indicators">
				<button type="button" data-bs-target="#carouselGourmet" data-bs-slide-to="0" class="active"
					aria-current="true" aria-label="Slide 1"></button>
				<button type="button" data-bs-target="#carouselGourmet" data-bs-slide-to="1"
					aria-label="Slide 2"></button>
				<button type="button" data-bs-target="#carouselGourmet" data-bs-slide-to="2"
					aria-label="Slide 3"></button>
			</div>
			<div class="carousel-inner rounded-4 overflow-hidden">
				<div class="carousel-item active">
					<img src="https://cometeelmar.com/stupload/stowlcarousel/ostras-sld-1.jpg" class="d-block w-100"
						alt="Frescura Garantizada">
				</div>
				<div class="carousel-item">
					<img src="https://cometeelmar.com/stupload/stowlcarousel/conservasahumadasporthos.jpg"
						class="d-block w-100" alt="Productos Gourmet">
				</div>
				<div class="carousel-item">
					<img src="https://cometeelmar.com/stupload/stowlcarousel/mojama-atun-rojo-sld-1.jpg"
						class="d-block w-100" alt="Cocina Saludable">
				</div>
			</div>
			<button class="carousel-control-prev" type="button" data-bs-target="#carouselGourmet" data-bs-slide="prev">
				<span class="carousel-control-prev-icon" aria-hidden="true"></span>
				<span class="visually-hidden">Anterior</span>
			</button>
			<button class="carousel-control-next" type="button" data-bs-target="#carouselGourmet" data-bs-slide="next">
				<span class="carousel-control-next-icon" aria-hidden="true"></span>
				<span class="visually-hidden">Siguiente</span>
			</button>
		</div>

		<div class="row g-4 text-center mb-5">
			<div class="col-md-4">
				<div class="card border-0 shadow-sm rounded-4 p-4 bg-white h-100 transition-all card-kpi">
					<div class="text-success fs-1 mb-3"><i class="bi bi-truck"></i></div>
					<h5 class="fw-bold text-dark">Envío Express Gratis</h5>
					<p class="text-muted mb-0">Recibe tu compra gratis en pedidos superiores a 100€.</p>
				</div>
			</div>
			<div class="col-md-4">
				<div class="card border-0 shadow-sm rounded-4 p-4 bg-white h-100 transition-all card-kpi">
					<div class="text-success fs-1 mb-3"><i class="bi bi-shield-check"></i></div>
					<h5 class="fw-bold text-dark">Garantía de Frescura</h5>
					<p class="text-muted mb-0">Si algún producto fresco no cumple tus expectativas, te devolvemos el
						importe.</p>
				</div>
			</div>
			<div class="col-md-4">
				<div class="card border-0 shadow-sm rounded-4 p-4 bg-white h-100 transition-all card-kpi">
					<div class="text-success fs-1 mb-3"><i class="bi bi-patch-check"></i></div>
					<h5 class="fw-bold text-dark">Máxima Calidad Local</h5>
					<p class="text-muted mb-0">Trabajamos mano a mano con agricultores y artesanos de nuestra tierra.
					</p>
				</div>
			</div>
		</div>

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2 class="fw-bold text-dark mb-0">Selección Destacada</h2>
		</div>

		<div th:replace="~{fragments/general :: productos}"></div>

	</div>

	<div th:replace="~{fragments/general :: pie}"></div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
