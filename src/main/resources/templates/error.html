<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Productos Gourmet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div th:replace="~{fragments/general :: cabecera}"></div>

    <div class="container d-flex flex-column align-items-center justify-content-center vh-100 text-center">
        <div class="card p-5 shadow-sm border-0 rounded-4" style="max-width: 500px;">
            <div class="card-body">
                <div class="mb-4 text-warning">
                    <i class="bi bi-exclamation-triangle-fill display-1"></i>
                </div>
                <h1 class="fw-bold text-dark mb-3">¡Vaya! Algo ha salido mal</h1>
                <p class="text-muted mb-4">Ha ocurrido un error inesperado en la página. Puedes volver al inicio pulsando el siguiente botón.</p>
                <a href="/" class="btn btn-primary btn-lg rounded-pill px-4 fw-bold shadow-sm">
                    <i class="bi bi-house-door-fill me-2"></i>Ir al inicio
                </a>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/general :: pie}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
